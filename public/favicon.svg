<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Dark background with clipped geometric shape -->
  <defs>
    <clipPath id="hexClip">
      <polygon points="32,2 58,16 58,48 32,62 6,48 6,16"/>
    </clipPath>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1814;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2a2520;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e85d26;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5a623;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Hexagon background -->
  <polygon points="32,2 58,16 58,48 32,62 6,48 6,16" fill="url(#bgGrad)" />

  <!-- Accent border -->
  <polygon points="32,2 58,16 58,48 32,62 6,48 6,16" fill="none" stroke="url(#accentGrad)" stroke-width="2" />

  <!-- Small corner accent top-right -->
  <polygon points="32,2 58,16 58,48 32,62 6,48 6,16" fill="none" stroke="#e85d26" stroke-width="1" stroke-dasharray="4 40" stroke-dashoffset="0" opacity="0.5"/>

  <!-- F letter -->
  <text
    x="13"
    y="42"
    font-family="Georgia, serif"
    font-size="26"
    font-weight="700"
    font-style="italic"
    fill="url(#accentGrad)"
    letter-spacing="-1"
  >F</text>

  <!-- J letter -->
  <text
    x="33"
    y="42"
    font-family="Georgia, serif"
    font-size="26"
    font-weight="700"
    font-style="italic"
    fill="#f0ede6"
    letter-spacing="-1"
  >J</text>

  <!-- Small dot accent -->
  <circle cx="52" cy="14" r="2.5" fill="#e85d26" opacity="0.8"/>
</svg>
